        sellers:
          type: array
          items:
            $ref: '#/components/schemas/SellerSummary'
        context:
          $ref: '#/components/schemas/CatalogContext'
        demoMode:
          $ref: '#/components/schemas/DemoMode'

    ProductDetailResponse:
      type: object
      required: [product, demoMode]
      properties:
        product:
          $ref: '#/components/schemas/ProductDetail'
