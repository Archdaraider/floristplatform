          $ref: '#/components/schemas/Message'
        demoMode:
          $ref: '#/components/schemas/DemoMode'

    SellerSettingsResponse:
      type: object
      required: [seller, demoMode]
      properties:
        seller:
          $ref: '#/components/schemas/SellerAccount'
