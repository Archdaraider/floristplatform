            $ref: '#/components/schemas/SellerReview'
        exceptions:
          type: array
          items:
            $ref: '#/components/schemas/AdminException'
        recentEvents:
          type: array
          maxItems: 12
          items:
            $ref: '#/components/schemas/AdminRecentEvent'
        demoMode:
          $ref: '#/components/schemas/DemoMode'
