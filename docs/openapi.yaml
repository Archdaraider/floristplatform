            message:
              type: string
            correlationId:
              type: string
            retryable:
              type: boolean
            fieldErrors:
              type: object
              additionalProperties:
                type: string
            recovery:
              type: string
        demoMode:
          $ref: '#/components/schemas/DemoMode'

    CatalogResponse:
      type: object
      required: [products, sellers, context, demoMode]
      properties:
        products:
          type: array
          items:
